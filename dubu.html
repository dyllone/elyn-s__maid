<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>개체 상세 정보 | 두부</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <a href="index.html" class="logo-link"><img src="./images/로고.png" alt="로고" class="logo"></a>
        </header>

        <section class="product-detail" style="display: flex; gap: 50px; margin-top: 50px;">
            <div class="detail-img" style="flex: 1;">
                <img src="./images/두부 프로필 사진.png" style="width: 100%; border-radius: 30px;">
            </div>

            <div class="detail-info" style="flex: 1;">
                <div style="display: flex; align-items: baseline; gap: 20px; margin-bottom: 10px;">
                    <h1 style="font-size: 3rem; margin: 0;">
                        두부 <span style="font-size: 1.2rem; color: #ff6eb4;">DU-GO21</span>
                    </h1>
                    <button class="reservation-btn" onclick="alert('예약이 완료되었습니다.')">예약하기</button>
                </div>

                <p style="font-size: 1.5rem; font-weight: bold; margin: 0;">판매가: -</p>
                <hr>

                <div class="status-box" style="background: #f9f9f9; padding: 20px; border-radius: 20px; margin: 20px 0;">
                    <h3>📈상품성 평가</h3>
                    <p><strong>규격:</strong> 172cm 53kg</p>
                    <p><strong>외형:</strong> 최상</p>
                    <p><strong>지능:</strong> 상</p>
                    <p><strong>근력:</strong> 최하</p>
                    <p><strong>순종도:</strong> 최상</p>
                    <p><strong>민감도:</strong> 상</p>

                    <h3>⚠️주요 결함</h3>
                    <p>[치명적 무능] [애정 결핍] [선택적 순종]</p>

                    <h3>🖋️ 검수관 총평</h3>
                    <p><i>"쓸모없는 손가락은 잘라내고,</p></i>
                    <p><i>예쁜 얼굴만 남겨 침대 곁에 두는 게 가장 효율적인 활용법 같네요."</p></i>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
